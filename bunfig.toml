[test]
coverage = true
coverageReporter = ["text"]
# 99% line coverage gate. Function coverage is omitted: Bun’s per-file function % can sit well below aggregate (e.g. parseEmailAttachments) without indicating missing tests (oven-sh/bun#9008).
coverageThreshold = { lines = 0.99 }
coverageSkipTestFiles = true

[serve.static]
plugins = ["bun-plugin-tailwind"]
env = "BUN_PUBLIC_*"