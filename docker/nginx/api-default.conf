server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # PHPUnit/Pest HTML report (requires: bun run test:backend:coverage)
    location = /coverage {
        return 301 /coverage/;
    }

    location ^~ /coverage/ {
        alias /var/www/html/coverage/html/;
        index index.html;
        autoindex off;
    }

    # Pre-built Bun SPAs (bun run build:compose) — api/public/static-spa/{tutor,enroll,verify}/
    # Must set index.html: inherited server index is index.php only, otherwise /tutor/ → 403.
    location ^~ /tutor/ {
        root /var/www/html/public/static-spa;
        index index.html;
        try_files $uri $uri/ /tutor/index.html;
    }

    location ^~ /enroll/ {
        root /var/www/html/public/static-spa;
        index index.html;
        try_files $uri $uri/ /enroll/index.html;
    }

    location ^~ /verify/ {
        root /var/www/html/public/static-spa;
        index index.html;
        try_files $uri $uri/ /verify/index.html;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
