# Production nginx inside single container — PHP-FPM on 127.0.0.1:9000
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Dev diagnostics and coverage artifacts are intentionally not bundled in prod.
    location = /coverage {
        return 404;
    }

    location ^~ /coverage/ {
        return 404;
    }

    location = /info.php {
        return 404;
    }

    location ^~ /dev/ {
        return 404;
    }

    location ^~ /tutor/ {
        root /var/www/html/public/static-spa;
        index index.html;
        try_files $uri $uri/ /tutor/index.html;
    }

    location ^~ /enroll/ {
        root /var/www/html/public/static-spa;
        index index.html;
        try_files $uri $uri/ /enroll/index.html;
    }

    location ^~ /verify/ {
        root /var/www/html/public/static-spa;
        index index.html;
        try_files $uri $uri/ /verify/index.html;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
