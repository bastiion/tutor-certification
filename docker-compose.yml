services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "7123:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/www:/var/www/html:ro
    depends_on:
      - php

  php:
    image: php:8.4-fpm-alpine
    volumes:
      - ./docker/www:/var/www/html:ro
