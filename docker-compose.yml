services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - docker/php/dev.env
    volumes:
      - ./api:/var/www/html
      - ./packages/crypto/test-vectors:/var/www/html/packages-crypto-test-vectors:ro
      - api_vendor:/var/www/html/vendor
    environment:
      # Bind-mounted ./api is often root-owned; use a container-writable SQLite file for local dev.
      IKWSD_SQLITE_PATH: /tmp/api-certs.sqlite
      MAILPIT_INTEGRATION: "1"
      MAILPIT_API_BASE: http://mailpit:8025
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    depends_on:
      - mailpit

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "7123:80"
    volumes:
      - ./api:/var/www/html:ro
      - ./docker/nginx/api-default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  api_vendor:
