# Production stack without Traefik: publish container port 8080 to the host.
# Prereq: `.env` next to this file (use the bundled `env-wizard` — see deploy/README.md).
#
# Usage (on the host):
#   docker compose -f docker-compose.direct.yml --env-file .env up -d

services:
  bastiion-certs:
    image: ${REGISTRY_IMAGE:?set REGISTRY_IMAGE}:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
