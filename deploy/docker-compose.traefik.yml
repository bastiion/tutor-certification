# One-shot stack: production app image + Traefik labels.
# Prereq: external Docker network that Traefik is attached to (see deploy/.env.example).
#
# Usage (on the host):
#   cp .env.example .env   # edit DOMAIN, network, image tag
#   docker compose -f docker-compose.traefik.yml --env-file .env up -d

services:
  bastiion-certs:
    image: ${REGISTRY_IMAGE:?set REGISTRY_IMAGE}:${IMAGE_TAG:?set IMAGE_TAG}
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK_NAME:?set TRAEFIK_NETWORK_NAME}
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-bastiion-certs}.rule=Host(`${DOMAIN:?set DOMAIN}`)
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-bastiion-certs}.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-bastiion-certs}.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.${TRAEFIK_ROUTER_NAME:-bastiion-certs}.loadbalancer.server.port=8080

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK_NAME:?set TRAEFIK_NETWORK_NAME}
