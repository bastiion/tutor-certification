name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

defaults:
  run:
    shell: bash

jobs:
  ghcr-release:
    runs-on: ubuntu-latest
    env:
      SMOKE_PORT: "18080"
    steps:
      - uses: actions/checkout@v6

      - name: Image name (lowercase GHCR)
        run: |
          lc_repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${lc_repo}" >>"${GITHUB_ENV}"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production image
        run: |
          docker build \
            --build-arg "APP_VERSION=${GITHUB_REF_NAME}" \
            -f docker/production/Dockerfile \
            -t "${IMAGE_NAME}:build" \
            .

      - name: Smoke test container
        run: |
          set -euo pipefail
          # PHPUnit fixture vars (committed test vectors) — Slim needs full env even for GET probes.
          cat <<'EOF' >/tmp/smoke-prod.env
          SERVER_BOX_KEYPAIR_BASE64=VwF3nZYCiwSLPd4McmJnuL-AcvVTmTkCUigrt_smwfkAY5pYm8Pzh6IFKbqAGRyaNOb7rrE-r4mgbZsz7pzuSg
          TOKEN_HMAC_KEY_BASE64=tjJGAH7zBwPU8jimGYL7S-EP9ssVlhuXNUehaxy6ZJk
          TUTOR_API_TOKEN=d471ffdacb4a62518e006e535878a8669d9134aa03c7ada6378e79a538f13ce2
          TUTOR_EMAIL=tutor@example.test
          PUBLIC_BASE_URL=http://localhost:7123
          SMTP_HOST=127.0.0.1
          SMTP_PORT=1
          MAIL_FROM_ADDRESS=noreply@example.test
          API_SQLITE_PATH=/tmp/smoke-release.sqlite
          GIT_SHA=release-smoke
          APP_VERSION=e2e-smoke
          EOF
          cid=$(docker run -d -p "${SMOKE_PORT}:8080" --env-file /tmp/smoke-prod.env "${IMAGE_NAME}:build")
          rm -f /tmp/smoke-prod.env
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${SMOKE_PORT}/api/health" >/dev/null 2>&1; then
              break
            fi
            if [[ "$i" -eq 60 ]]; then
              echo "::error::Container did not become ready on /api/health"
              docker logs "$cid" 2>&1 | tail -200 || true
              exit 1
            fi
            sleep 1
          done

          curl -fsS "http://127.0.0.1:${SMOKE_PORT}/api/health" \
            | python3 -c 'import json,sys; j=json.load(sys.stdin); assert j.get("ok") is True; assert j.get("schema_versions") == {"certificate": 1, "revocation": 1}; assert j.get("app_version") == "e2e-smoke"'
          curl -fsS "http://127.0.0.1:${SMOKE_PORT}/tutor/" >/dev/null
          curl -fsS "http://127.0.0.1:${SMOKE_PORT}/enroll/" >/dev/null
          curl -fsS "http://127.0.0.1:${SMOKE_PORT}/verify/" >/dev/null

          for bad in /info.php /dev/ /coverage/ /coverage; do
            code=$(curl -o /dev/null -sS -w '%{http_code}' "http://127.0.0.1:${SMOKE_PORT}${bad}" || echo "000")
            if [[ "${code}" != "404" ]]; then
              echo "::error::Expected 404 for ${bad}, got ${code}"
              exit 1
            fi
          done

      - name: Tag and push to GHCR
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          docker tag "${IMAGE_NAME}:build" "${IMAGE_NAME}:${tag}"
          docker tag "${IMAGE_NAME}:build" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${tag}"
          docker push "${IMAGE_NAME}:latest"

      - name: Publish GitHub Release (compose bundle)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            deploy/docker-compose.traefik.yml
            deploy/docker-compose.direct.yml
            deploy/.env.example
            deploy/README.md

      - name: Summary
        run: |
          {
            echo "## Release"
            echo "- Image **${IMAGE_NAME}:${GITHUB_REF_NAME}** (also **latest**)"
            echo "- Assets: Traefik + direct compose, \`.env.example\`, deploy README"
          } >>"${GITHUB_STEP_SUMMARY}"
